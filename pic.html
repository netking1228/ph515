<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>圖片資料庫｜Gallery</title>

  <!-- ✅ Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ✅ PhotoSwipe 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.css">

  <style>
    :root{
      --ink:#0b2239; --bg:#f8fafc; --muted:#6b7280; --brand:#0d6efd;
    }
    body{background:var(--bg); color:var(--ink)}
    .gallery-grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap:14px;
    }
    .g-card{
      position:relative; border-radius:16px; overflow:hidden; background:#fff;
      box-shadow:0 2px 10px rgba(0,0,0,.06)
    }
    .g-card img{width:100%; height:220px; object-fit:cover; display:block}
    .g-badge{
      position:absolute; left:10px; top:10px;
      backdrop-filter: blur(6px);
      background:rgba(0,0,0,.45); color:#fff;
      padding:4px 8px; border-radius:999px; font-size:.8rem
    }
    .g-title{font-weight:600; font-size:.95rem}
    .g-meta{color:var(--muted); font-size:.85rem}
    .pswp__caption__center{text-align:left}
    .tag-chip{cursor:pointer}
    .tag-chip.active{background:var(--brand); color:#fff}
    .sticky-top-controls{
      position:sticky; top:0; z-index:999;
      background:linear-gradient(#f8fafc 70%, rgba(248,250,252,0));
      padding-top:10px
    }
  </style>

  <!--
  使用說明：
  1) 圖片放到 /assets/...（你目前用 /assets/pic/）
  2) 最下面 GALLERY 陣列新增項目：
     { title:"標題", src:"/assets/pic/xxx.jpg", tags:["分類"], note:"備註", w:2000, h:1333, thumb:"縮圖" }
  3) 點縮圖會用 PhotoSwipe 放大檢視（可滾輪縮放、拖曳）。
  4) 如果你是用本機直接開 file:/// 可能會被瀏覽器擋 CDN，建議用 jekyll serve 或 Live Server。
  -->
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">圖片資料庫</a>
      <div class="ms-auto small text-secondary">
        <span id="countAll">0</span> 張 · <span id="countVisible">0</span> 可見
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <section class="sticky-top-controls pb-2">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-md-6">
          <div class="input-group input-group-lg">
            <span class="input-group-text bg-white">🔎</span>
            <input id="q" class="form-control" placeholder="搜尋：標題、標籤、備註…" />
            <button class="btn btn-outline-secondary" id="btnClear" type="button">清除</button>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <select id="selTag" class="form-select form-select-lg">
            <option value="">全部標籤</option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <select id="selSort" class="form-select form-select-lg">
            <option value="new">最新在前</option>
            <option value="old">最舊在前</option>
            <option value="az">標題 A→Z</option>
            <option value="za">標題 Z→A</option>
          </select>
        </div>
      </div>
      <div class="mt-2" id="tagChips"></div>
    </section>

    <section class="mt-3">
      <div id="grid" class="gallery-grid"></div>
    </section>
  </main>

  <!-- ✅ PhotoSwipe 根節點（必留） -->
  <div class="pswp" tabindex="-1" role="dialog" aria-hidden="true"></div>

  <!-- ✅ JS：Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ✅ PhotoSwipe（UMD）+ Lightbox（UMD） => 最穩、點了就會放大 -->
  <script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe-lightbox.umd.min.js"></script>

  <script>
    /**********************
     * 1) 圖片資料（你只要改這裡就好）
     **********************/
    const GALLERY = [
      { title: "機票價格",     src: "/assets/pic/t1.jpg", tags:["機票"] },
      { title: "團体票規定",   src: "/assets/pic/t2.jpg", tags:["機票"] },
      { title: "2025連假",     src: "/assets/pic/t3.jpg", tags:["機票"] },
      { title: "包套分析１",   src: "/assets/pic/w1.jpg", tags:["包套"] },
      { title: "包套分析２",   src: "/assets/pic/w2.jpg", tags:["包套"] },
      { title: "2025接單分析515",  src: "/assets/pic/2025/515-2025.jpg", tags:["2025接單"] },
      { title: "2025接單分析fish", src: "/assets/pic/2025/idlefish-2025.jpg", tags:["2025接單"] },
      { title: "2025接單分析1",    src: "/assets/pic/2025/52-2025.jpg", tags:["2025接單"] },
      { title: "調房民宿1",    src: "/assets/pic/room/room1.jpg", tags:["調房民宿"] },
      { title: "調房民宿2",    src: "/assets/pic/room/room2.jpg", tags:["調房民宿"] },
      { title: "調房民宿3",    src: "/assets/pic/room/room3.jpg", tags:["調房民宿"] },
      { title: "華信窗口",     src: "/assets/pic/air.jpg", tags:["華信窗口"] },
      { title: "圖片指令",     src: "/assets/pic/map.jpg", tags:["圖片指令"] },
      { title: "圖片指令1",    src: "/assets/pic/map-1.jpg", tags:["圖片指令"] },
      { title: "租車價格",     src: "/assets/pic/car.jpg", tags:["租車價格"] },
      { title: "花火時間",     src: "/assets/pic/fire1.jpg", tags:["花火時間"] },
      { title: "mac1",    src: "/assets/pic/mac/mac-1.jpg", tags:["mac操作"] },
      { title: "mac2",    src: "/assets/pic/mac/mac-2.jpg", tags:["mac操作"] },
      { title: "mac3",    src: "/assets/pic/mac/mac-3.jpg", tags:["mac操作"] },
     { title: "mac4",    src: "/assets/pic/mac/mac-4.jpg", tags:["mac操作"] },


    ];

    /**********************
     * 2) DOM
     **********************/
    const $  = (sel, el=document) => el.querySelector(sel);
    const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));

    const grid = $('#grid');
    const q = $('#q');
    const selTag = $('#selTag');
    const selSort = $('#selSort');
    const btnClear = $('#btnClear');
    const countAll = $('#countAll');
    const countVisible = $('#countVisible');
    const tagChips = $('#tagChips');

    /**********************
     * 3) 狀態 / 基底資料（保留原順序）
     **********************/
    let state = { q:"", tag:"", sort:"new" };

    const BASE = GALLERY.map((it, i) => ({
      ...it,
      _i: i,                         // 用來做 new/old 的穩定排序
      id: it.id || `img-${i}`,        // 自動補 id
      w: it.w || 1600,               // 沒填就用預設，PhotoSwipe 才不會開不起來
      h: it.h || 900
    }));

    /**********************
     * 4) PhotoSwipe Lightbox（只初始化一次）
     **********************/
    let lightbox = null;

    function initLightboxOnce(){
      if (lightbox) return;

      // ✅ 用 UMD 的方式：pswpModule 直接給全域 PhotoSwipe（最穩）
      lightbox = new PhotoSwipeLightbox({
        gallery: '#grid',
        children: 'a',
        pswpModule: PhotoSwipe
      });

      // 你想要更像「看資料」：預設可以滾輪縮放、拖曳、雙擊縮放
      lightbox.init();
    }

    /**********************
     * 5) 初始化
     **********************/
    function init(){
      countAll.textContent = BASE.length;
      buildTagFilters();
      bindUI();
      initLightboxOnce();
      render();
    }

    function buildTagFilters(){
      const tagSet = new Set();
      BASE.forEach(it => (it.tags||[]).forEach(t => tagSet.add(t)));

      [...tagSet].sort().forEach(t=>{
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        selTag.appendChild(opt);
      });

      const frag = document.createDocumentFragment();
      const makeChip = (text, value="")=>{
        const btn = document.createElement('button');
        btn.type='button';
        btn.className='btn btn-sm btn-outline-secondary me-2 mb-2 tag-chip';
        btn.dataset.value=value; btn.textContent=text;
        btn.addEventListener('click', ()=>{
          selTag.value=value;
          state.tag=value;
          render();
          highlightChips();
        });
        return btn;
      };

      frag.appendChild(makeChip('全部', ''));
      [...tagSet].sort().forEach(t=> frag.appendChild(makeChip(t, t)));
      tagChips.appendChild(frag);
      highlightChips();
    }

    function highlightChips(){
      $$('.tag-chip').forEach(b=> b.classList.toggle('active', b.dataset.value===state.tag));
    }

    function bindUI(){
      q.addEventListener('input', ()=>{
        state.q = q.value.trim().toLowerCase();
        render();
      });
      selTag.addEventListener('change', ()=>{
        state.tag = selTag.value;
        render();
        highlightChips();
      });
      selSort.addEventListener('change', ()=>{
        state.sort = selSort.value;
        render();
      });
      btnClear.addEventListener('click', ()=>{
        q.value=''; state.q='';
        render();
      });
    }

    /**********************
     * 6) filter / sort
     **********************/
    function filterList(list){
      const {q, tag} = state;
      return list.filter(it=>{
        const text = `${it.title||''} ${(it.tags||[]).join(' ')} ${it.note||''}`.toLowerCase();
        const qok = q ? text.includes(q) : true;
        const tok = tag ? (it.tags||[]).includes(tag) : true;
        return qok && tok;
      });
    }

    function sortList(list){
      const arr = [...list];
      switch(state.sort){
        case 'old': arr.sort((a,b)=> a._i - b._i); break;
        case 'new': arr.sort((a,b)=> b._i - a._i); break;
        case 'az':  arr.sort((a,b)=> (a.title||'').localeCompare(b.title||'', 'zh-Hant')); break;
        case 'za':  arr.sort((a,b)=> (b.title||'').localeCompare(a.title||'', 'zh-Hant')); break;
      }
      return arr;
    }

    /**********************
     * 7) render（更新 DOM 後 lightbox.refresh()）
     **********************/
    function render(){
      const view = sortList(filterList(BASE));
      countVisible.textContent = view.length;

      grid.innerHTML = '';
      const frag = document.createDocumentFragment();

      view.forEach((it)=>{
        const a = document.createElement('a');
        a.href = it.src;

        // ✅ PhotoSwipe 需要寬高（沒填就用預設），避免點了沒反應/開不起來
        a.setAttribute('data-pswp-width', it.w);
        a.setAttribute('data-pswp-height', it.h);

        // ✅ 你可以加 caption（顯示在放大圖底下）
        const capText = [it.title, (it.tags||[]).join(' · '), it.note||''].filter(Boolean).join('｜');
        a.setAttribute('data-pswp-caption', capText);

        a.className = 'g-card text-decoration-none text-reset';

        const badge = document.createElement('div');
        badge.className = 'g-badge';
        badge.textContent = (it.tags||[]).join(' · ');

        const img = document.createElement('img');
        img.loading='lazy';
        img.alt = it.title || '';
        img.src = it.thumb || it.src;

        const cap = document.createElement('div');
        cap.className = 'p-2';
        cap.innerHTML = `
          <div class="g-title">${escapeHtml(it.title||'無標題')}</div>
          <div class="g-meta">${escapeHtml(it.note||'')}</div>
        `;

        a.appendChild(img);
        a.appendChild(badge);
        a.appendChild(cap);
        frag.appendChild(a);
      });

      grid.appendChild(frag);

      // ✅ 重繪後告訴 lightbox 重新掃描 children
      if (lightbox) lightbox.refresh();
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[s]));
    }

    // 啟動
    init();
  </script>
</body>
</html>
