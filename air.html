<section class="flight-tool-section py-5">
  <div class="container">
    <div class="flight-tool-wrap shadow-sm rounded-4 p-4 p-lg-5 bg-white">
      <div class="row align-items-center mb-4">
        <div class="col-lg-8">
          <span class="badge rounded-pill text-bg-primary mb-2">旅行社快速工具</span>
          <h2 class="mb-2 fw-bold">澎湖機位快速查詢</h2>
          <p class="text-muted mb-0">
            快速開啟立榮、華信官方訂位頁，方便旅行社查詢可訂班次與機位狀況。
          </p>
        </div>
        <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
          <small class="text-secondary">適合：澎湖自由行 / 包棟 / 團體旅遊詢位</small>
        </div>
      </div>

      <!-- 常用快速路線 -->
      <div class="quick-routes mb-4">
        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-outline-primary route-btn" data-from="TSA" data-to="MZG">松山 → 澎湖</button>
          <button type="button" class="btn btn-outline-primary route-btn" data-from="RMQ" data-to="MZG">台中 → 澎湖</button>
          <button type="button" class="btn btn-outline-primary route-btn" data-from="KHH" data-to="MZG">高雄 → 澎湖</button>
          <button type="button" class="btn btn-outline-primary route-btn" data-from="CYI" data-to="MZG">嘉義 → 澎湖</button>
          <button type="button" class="btn btn-outline-secondary route-btn" data-from="MZG" data-to="TSA">澎湖 → 松山</button>
          <button type="button" class="btn btn-outline-secondary route-btn" data-from="MZG" data-to="RMQ">澎湖 → 台中</button>
          <button type="button" class="btn btn-outline-secondary route-btn" data-from="MZG" data-to="KHH">澎湖 → 高雄</button>
        </div>
      </div>

      <!-- 查詢表單 -->
      <div class="row g-3">
        <div class="col-md-3">
          <label for="flightFrom" class="form-label fw-semibold">出發地</label>
          <select id="flightFrom" class="form-select">
            <option value="TSA">台北松山 TSA</option>
            <option value="RMQ">台中 RMQ</option>
            <option value="KHH">高雄 KHH</option>
            <option value="CYI">嘉義 CYI</option>
            <option value="MZG">澎湖 MZG</option>
          </select>
        </div>

        <div class="col-md-3">
          <label for="flightTo" class="form-label fw-semibold">目的地</label>
          <select id="flightTo" class="form-select">
            <option value="MZG">澎湖 MZG</option>
            <option value="TSA">台北松山 TSA</option>
            <option value="RMQ">台中 RMQ</option>
            <option value="KHH">高雄 KHH</option>
            <option value="CYI">嘉義 CYI</option>
          </select>
        </div>

        <div class="col-md-2">
          <label for="flightDate" class="form-label fw-semibold">出發日期</label>
          <input type="date" id="flightDate" class="form-control">
        </div>

        <div class="col-md-2">
          <label for="flightPax" class="form-label fw-semibold">人數</label>
          <select id="flightPax" class="form-select">
            <option value="1">1 位</option>
            <option value="2">2 位</option>
            <option value="3">3 位</option>
            <option value="4">4 位</option>
          </select>
        </div>

        <div class="col-md-2">
          <label for="flightNote" class="form-label fw-semibold">備註</label>
          <input type="text" id="flightNote" class="form-control" placeholder="例如：客人要早班">
        </div>
      </div>

      <div class="row g-3 mt-1">
        <div class="col-lg-4">
          <button type="button" class="btn btn-primary w-100 btn-lg" id="searchBothBtn">
            同時開啟立榮＋華信
          </button>
        </div>
        <div class="col-lg-4">
          <button type="button" class="btn btn-success w-100 btn-lg" id="searchUniBtn">
            只開立榮
          </button>
        </div>
        <div class="col-lg-4">
          <button type="button" class="btn btn-warning w-100 btn-lg text-dark" id="searchMandarinBtn">
            只開華信
          </button>
        </div>
      </div>

      <div class="result-box mt-4 p-3 rounded-3 bg-light border">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2">
          <div>
            <div class="fw-bold mb-1">本次查詢條件</div>
            <div id="querySummary" class="text-secondary">尚未設定</div>
          </div>
          <div class="text-secondary small">
            查詢後將開啟航空公司官方訂位頁面
          </div>
        </div>
      </div>

      <div class="mt-3 small text-secondary">
        備註：本工具為旅行社快速入口，實際可訂班次、剩餘座位、票價與規則，請以航空公司官方頁面為準。
      </div>
    </div>
  </div>
</section>

<style>
.flight-tool-section {
  background: linear-gradient(180deg, #f7fbff 0%, #eef5fb 100%);
}

.flight-tool-wrap {
  border: 1px solid #e8eef5;
}

.flight-tool-wrap h2 {
  letter-spacing: 0.5px;
}

.quick-routes .btn {
  border-radius: 999px;
}

.result-box {
  min-height: 84px;
}

@media (max-width: 767.98px) {
  .flight-tool-wrap {
    padding: 1.25rem !important;
  }
}
</style>

<script>
(function () {
  const fromEl = document.getElementById("flightFrom");
  const toEl = document.getElementById("flightTo");
  const dateEl = document.getElementById("flightDate");
  const paxEl = document.getElementById("flightPax");
  const noteEl = document.getElementById("flightNote");
  const summaryEl = document.getElementById("querySummary");

  const searchBothBtn = document.getElementById("searchBothBtn");
  const searchUniBtn = document.getElementById("searchUniBtn");
  const searchMandarinBtn = document.getElementById("searchMandarinBtn");

  const uniAirUrl = "https://www.uniair.com.tw/rwd/B2C/booking/ubk_search.aspx";
  const mandarinUrl = "https://www.mandarin-airlines.com/b2c/bookingnpurchase";

  function todayString() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function airportName(code) {
    const map = {
      TSA: "台北松山",
      RMQ: "台中",
      KHH: "高雄",
      CYI: "嘉義",
      MZG: "澎湖"
    };
    return map[code] || code;
  }

  function updateSummary() {
    const fromText = airportName(fromEl.value);
    const toText = airportName(toEl.value);
    const dateText = dateEl.value || "未選日期";
    const paxText = paxEl.value + " 位";
    const noteText = noteEl.value ? `｜備註：${noteEl.value}` : "";

    summaryEl.textContent = `${fromText} → ${toText} ｜ ${dateText} ｜ ${paxText}${noteText}`;
    saveData();
  }

  function saveData() {
    const data = {
      from: fromEl.value,
      to: toEl.value,
      date: dateEl.value,
      pax: paxEl.value,
      note: noteEl.value
    };
    localStorage.setItem("penghuFlightToolData", JSON.stringify(data));
  }

  function loadData() {
    const raw = localStorage.getItem("penghuFlightToolData");
    if (!raw) {
      dateEl.value = todayString();
      updateSummary();
      return;
    }

    try {
      const data = JSON.parse(raw);
      if (data.from) fromEl.value = data.from;
      if (data.to) toEl.value = data.to;
      if (data.date) dateEl.value = data.date;
      if (data.pax) paxEl.value = data.pax;
      if (data.note) noteEl.value = data.note;
    } catch (e) {
      dateEl.value = todayString();
    }

    if (!dateEl.value) {
      dateEl.value = todayString();
    }

    updateSummary();
  }

  function validateRoute() {
    if (fromEl.value === toEl.value) {
      alert("出發地與目的地不能相同");
      return false;
    }
    return true;
  }

  function openUniAir() {
    window.open(uniAirUrl, "_blank");
  }

  function openMandarin() {
    window.open(mandarinUrl, "_blank");
  }

  function searchBoth() {
    if (!validateRoute()) return;
    updateSummary();
    openUniAir();
    setTimeout(function () {
      openMandarin();
    }, 700);
  }

  document.querySelectorAll(".route-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      fromEl.value = this.dataset.from;
      toEl.value = this.dataset.to;
      updateSummary();
    });
  });

  [fromEl, toEl, dateEl, paxEl, noteEl].forEach(function (el) {
    el.addEventListener("change", updateSummary);
    el.addEventListener("input", updateSummary);
  });

  searchBothBtn.addEventListener("click", searchBoth);
  searchUniBtn.addEventListener("click", function () {
    if (!validateRoute()) return;
    updateSummary();
    openUniAir();
  });
  searchMandarinBtn.addEventListener("click", function () {
    if (!validateRoute()) return;
    updateSummary();
    openMandarin();
  });

  loadData();
})();
</script>
